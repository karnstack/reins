<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Page not found — reins</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <script>
      // Honor the theme picked on the main site; unset follows the OS.
      try {
        const t = localStorage.getItem("theme");
        if (t === "light" || t === "dark") document.documentElement.classList.add(t);
      } catch (_e) {}
    </script>
    <style>
      :root {
        color-scheme: light dark;
      }
      :root.light {
        color-scheme: light;
      }
      :root.dark {
        color-scheme: dark;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100dvh;
        font-family:
          "InterVariable", ui-sans-serif, system-ui, sans-serif;
        background: light-dark(#fff, #0a0a0a);
        color: light-dark(#171717, #fafafa);
      }
      main {
        text-align: center;
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        margin: 0 0 0.5rem;
      }
      p {
        color: light-dark(#737373, #a3a3a3);
        margin: 0 0 1.5rem;
      }
      a {
        color: inherit;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page not found</h1>
      <p>That page doesn't exist or has moved.</p>
      <a href="/">Back to reins.karnstack.com</a>
    </main>
  </body>
</html>
