<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>reins</title>
  </head>
  <body>
    <main class="reins">
      <header class="reins__header">
        <span class="reins__mark" aria-hidden="true">
          <svg viewBox="0 0 128 128" fill="none" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
            <path d="M42 42 C 42 80, 86 48, 86 86" stroke="#fff" stroke-width="12" stroke-linecap="round" fill="none" />
            <circle cx="42" cy="42" r="13" fill="#fff" />
            <circle cx="86" cy="86" r="13" fill="#fff" />
          </svg>
        </span>
        <div class="reins__heading">
          <h1 class="reins__title">reins</h1>
          <p class="reins__subtitle">Drive this browser from your agent</p>
        </div>
        <span class="reins__status reins__status--idle" id="status" role="status">
          <span class="reins__status-dot"></span>
          <span class="reins__status-label" id="status-label">Disconnected</span>
        </span>
      </header>

      <dl class="reins__info" id="info" hidden>
        <div class="reins__info-row">
          <dt>Daemon</dt>
          <dd id="info-daemon">—</dd>
        </div>
        <div class="reins__info-row">
          <dt>This browser</dt>
          <dd id="info-browser">—</dd>
        </div>
      </dl>

      <p class="reins__hint" id="hint">
        Looking for the reins daemon on this machine… start it with
        <code>reins up</code>. Dev build? Run <code>reins allow &lt;id&gt;</code>
        with the ID from <code>chrome://extensions</code>.
      </p>

      <button class="reins__btn reins__btn--ghost reins__btn--danger" id="toggle" type="button">
        Disconnect
      </button>

      <details class="reins__advanced">
        <summary>Advanced</summary>
        <div class="reins__field">
          <label class="reins__label" for="port">Pin daemon port (empty = auto-discover)</label>
          <input
            class="reins__input reins__input--mono"
            id="port"
            name="port"
            type="number"
            min="1"
            max="65535"
            placeholder="auto"
            autocomplete="off"
          />
        </div>
        <button class="reins__btn reins__btn--ghost" id="save-port" type="button">
          Save &amp; reconnect
        </button>
      </details>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
