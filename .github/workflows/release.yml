name: release

# Publish flow (see docs/PUBLISHING.md):
#   1. Bump versions (packages/mcp + packages/extension package.json).
#   2. Tag: git tag v0.1.0 && git push --tags
#   3. This workflow publishes @karnstack/reins to npm and attaches the extension
#      zip to the GitHub release. Requires the NPM_TOKEN repo secret.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: jdx/mise-action@v4.2.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm zip

      - name: Publish @karnstack/reins to npm
        run: |
          pnpm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          pnpm publish --filter @karnstack/reins --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub release with extension zip
        uses: softprops/action-gh-release@v2
        with:
          files: packages/extension/release/*.zip
          generate_release_notes: true
